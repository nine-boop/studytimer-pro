{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to StudyTimer Pro 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-tr from-rose-50 via-purple-50 to-indigo-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-6 bg-white/80 backdrop-blur-md p-10 rounded-[2rem] shadow-xl shadow-pink-100/50 border-4 border-pink-100 relative overflow-hidden">
        
        <div class="absolute -top-6 -right-6 text-4xl opacity-20">🌸</div>
        <div class="absolute -bottom-6 -left-6 text-4xl opacity-20">🎀</div>

        <div class="text-center">
            <span class="text-4xl">🐱</span>
            <h2 class="mt-3 text-3xl font-black text-purple-700 tracking-tight">Welcome back</h2>
            <p class="mt-1 text-xs font-bold text-pink-400 tracking-wider uppercase">StudyTimer Pro Studio 🌟</p>
        </div>

        <form class="mt-6 space-y-4" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-3">
                <input id="username" name="username" type="text" required class="w-full px-4 py-3 rounded-2xl border-2 border-purple-100 placeholder-purple-300 text-purple-700 focus:outline-none focus:border-pink-300 text-sm font-medium bg-purple-50/30 transition shadow-inner" placeholder="Username 🧸">
                <input id="password" name="password" type="password" required class="w-full px-4 py-3 rounded-2xl border-2 border-purple-100 placeholder-purple-300 text-purple-700 focus:outline-none focus:border-pink-300 text-sm font-medium bg-purple-50/30 transition shadow-inner" placeholder="Password 🔒">
            </div>

            <button type="submit" class="w-full py-3 px-4 rounded-2xl text-sm font-black text-white bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 transform active:scale-95 transition shadow-md shadow-pink-200">
                Let's Study! ✨
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t-2 border-dashed border-purple-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="px-3 bg-white text-purple-300 font-bold tracking-widest">or continue with</span></div>
        </div>

        <a href="{% provider_login_url 'google' %}" class="w-full flex items-center justify-center px-4 py-3 border-2 border-purple-100 rounded-2xl shadow-sm bg-white text-sm font-black text-purple-600 hover:bg-pink-50/50 transition">
            <img class="h-4 w-4 mr-2.5" src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
            Google Account 🚀
        </a>

        <p class="mt-6 text-center text-xs font-bold text-purple-400">
            New here? <a href="{% url 'register' %}" class="text-pink-500 hover:text-purple-500 underline decoration-pink-300 underline-offset-4 transition">Create an account 🌸</a>
        </p>

    </div>
</body>
</html>
