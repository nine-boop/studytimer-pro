<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-[#F8FAFC]">
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100 w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Forgot Password</h2>
        <p class="text-gray-400 text-sm mb-6">We will send a verification code</p>
        <form method="POST" action="{% url 'verify_otp' %}" class="space-y-4 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Email Address</label>
                <input type="email" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition text-sm">Send Code</button>
        </form>
    </div>
</body>
</html>
