<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Enter Verification Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-[#F8FAFC]">
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100 w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Enter Verification Code</h2>
        <p class="text-gray-400 text-sm mb-6">Type the 4-digit security code below</p>
        <form method="POST" action="{% url 'dashboard' %}" class="space-y-6">
            {% csrf_token %}
            <div class="flex justify-center gap-4">
                <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" maxlength="1" class="w-12 h-12 text-center text-xl font-bold border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition text-sm">Verify</button>
        </form>
    </div>
</body>
</html>
