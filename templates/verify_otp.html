<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-tr from-rose-50 via-purple-50 to-indigo-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-sm w-full space-y-6 bg-white/80 backdrop-blur-md p-10 rounded-[2rem] shadow-xl shadow-pink-100/50 border-4 border-pink-100 relative overflow-hidden">
        
        <div class="absolute -top-6 -left-6 text-4xl opacity-20">☁️</div>
        
        <div class="text-center">
            <span class="text-4xl">💌</span>
            <h2 class="mt-3 text-2xl font-black text-purple-700 tracking-tight">Security Check</h2>
            <p class="mt-1 text-[10px] font-bold text-pink-400 tracking-wider uppercase">Enter your 4-digit code ✨</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="p-4 text-xs font-black rounded-2xl bg-pink-100 text-pink-600 border-2 border-pink-200 text-center shadow-inner">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form class="mt-6 space-y-6" action="{% url 'verify_otp' %}" method="POST">
            {% csrf_token %}
            <div class="flex justify-center gap-3">
                <input name="otp1" type="text" maxlength="1" required class="w-12 h-14 text-center text-xl font-black rounded-2xl border-2 border-purple-100 text-purple-700 focus:outline-none focus:border-pink-300 bg-purple-50/30 shadow-inner">
                <input name="otp2" type="text" maxlength="1" required class="w-12 h-14 text-center text-xl font-black rounded-2xl border-2 border-purple-100 text-purple-700 focus:outline-none focus:border-pink-300 bg-purple-50/30 shadow-inner">
                <input name="otp3" type="text" maxlength="1" required class="w-12 h-14 text-center text-xl font-black rounded-2xl border-2 border-purple-100 text-purple-700 focus:outline-none focus:border-pink-300 bg-purple-50/30 shadow-inner">
                <input name="otp4" type="text" maxlength="1" required class="w-12 h-14 text-center text-xl font-black rounded-2xl border-2 border-purple-100 text-purple-700 focus:outline-none focus:border-pink-300 bg-purple-50/30 shadow-inner">
            </div>

            <button type="submit" class="w-full py-3 px-4 rounded-2xl text-sm font-black text-white bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 transform active:scale-95 transition shadow-md shadow-pink-200">
                Verify Me! 🚀
            </button>
        </form>
    </div>

    <script>
        // Cute script to auto-jump to the next input box
        const inputs = document.querySelectorAll('input[type="text"]');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });
    </script>
</body>
</html>
