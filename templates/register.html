<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Create Account - StudyTimer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center h-screen bg-[#F8FAFC] font-['Inter']">
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100 w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">Create Account</h2>
        <p class="text-gray-400 text-sm mb-6">Sign up to get started</p>
        
        <form method="POST" class="space-y-4 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl mt-2 transition text-sm">Sign Up</button>
        </form>
        <p class="mt-6 text-sm text-gray-400">Already have an account? <a href="{% url 'login' %}" class="text-blue-500 font-semibold">Login</a></p>
    </div>
</body>
</html>
